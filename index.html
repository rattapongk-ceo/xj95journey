<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XJ95 Journey - Sheets Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #059669; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Configuration ---
        // ใส่ URL ที่ได้จาก Google Apps Script Deployment
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwj5cx3FTjLoEnBt3w4jTfzF1GfpgPS9X-UZNZr1GpI7WI81IvHHvDc_Rwdll5sjxNgpA/exec";
        const ACCESS_PASSWORD = "xj1995";

        const THAI_PROVINCES = ["กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น", "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร", "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก", "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี", "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์", "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง", "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต", "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยโสธร", "ยะลา", "ร้อยเอ็ด", "ระนอง", "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย", "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม", "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี", "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อำนาจเจริญ", "อุดรธานี", "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี"];

        const MAP_GRID = [
            [null, null, "เชียงราย", "พะเยา", "น่าน"],
            [null, "แม่ฮ่องสอน", "เชียงใหม่", "ลำพูน", "แพร่"],
            [null, null, "ลำปาง", "อุตรดิตถ์", "เลย"],
            [null, "ตาก", "สุโขทัย", "พิษณุโลก", "หนองคาย", "บึงกาฬ"],
            [null, null, "กำแพงเพชร", "พิจิตร", "เพชรบูรณ์", "อุดรธานี", "สกลนคร", "นครพนม"],
            [null, null, "นครสวรรค์", "อุทัยธานี", "ชัยภูมิ", "ขอนแก่น", "กาฬสินธุ์", "มุกดาหาร"],
            [null, null, "ชัยนาท", "สิงห์บุรี", "ลพบุรี", "นครราชสีมา", "มหาสารคาม", "ร้อยเอ็ด", "ยโสธร", "อำนาจเจริญ"],
            [null, "สุพรรณบุรี", "อ่างทอง", "สระบุรี", "นครนายก", "ปราจีนบุรี", "ศรีสะเกษ", "อุบลราชธานี"],
            ["กาญจนบุรี", "นครปฐม", "นนทบุรี", "พระนครศรีอยุธยา", "ปทุมธานี", "สระแก้ว", "บุรีรัมย์", "สุรินทร์"],
            [null, "ราชบุรี", "สมุทรสงคราม", "กรุงเทพมหานคร", "ฉะเชิงเทรา", "ชลบุรี"],
            [null, "เพชรบุรี", "สมุทรสาคร", "สมุทรปราการ", "ระยอง", "จันทบุรี", "ตราด"],
            [null, "ประจวบคีรีขันธ์"],
            [null, "ชุมพร", "ระนอง"],
            [null, "สุราษฎร์ธานี", "พังงา", "ภูเก็ต"],
            [null, "นครศรีธรรมราช", "กระบี่"],
            [null, "พัทลุง", "ตรัง", "สงขลา", "สตูล"],
            [null, "ปัตตานี", "ยะลา", "นราธิวาส"]
        ];

        // --- UI Icons ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Map: <path d="M14.12 3.88 16 2l5 5-5 5-1.88-1.88"/><path d="M19 16c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V7c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2v2"/><path d="M9 10h6"/><path d="M9 14h6"/><path d="m14.5 14.5-5-5"/>,
                Mountain: <path d="m8 3 4 8 5-5 5 15H2L8 3z"/>,
                Trees: <path d="M10 10v.01"/><path d="M14 10v.01"/><path d="M7 6a4 4 0 0 1 10 0"/><path d="M12 2v4"/><path d="M9 22v-4h6v4"/><path d="M8 12a5 5 0 0 0-1 10h10a5 5 0 0 0-1-10h-8Z"/>,
                Compass: <circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/>,
                Plus: <path d="M5 12h14M12 5v14" />,
                Lock: <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>,
                Trash2: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" />,
                Calendar: <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/>,
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                Clock: <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>,
                Route: <circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(sessionStorage.getItem('xj95_auth') === 'true');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [trips, setTrips] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentView, setCurrentView] = useState('map');
            const [showModal, setShowModal] = useState(false);
            const [formData, setFormData] = useState({ title: '', province: '', date: new Date().toISOString().split('T')[0], duration: 1, distance: 0, imageUrl: '', notes: '' });

            const fetchTrips = async () => {
                try {
                    setLoading(true);
                    const res = await fetch(scriptUrl);
                    const data = await res.json();
                    // Clean data from sheet (filter out empty rows if any)
                    setTrips(data.filter(item => item.id));
                } catch (err) { console.error("Fetch Error:", err); }
                finally { setLoading(false); }
            };

            useEffect(() => {
                if (isAuthenticated) fetchTrips();
            }, [isAuthenticated]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === ACCESS_PASSWORD) {
                    setIsAuthenticated(true);
                    sessionStorage.setItem('xj95_auth', 'true');
                } else {
                    setLoginError(true);
                }
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                try {
                    await fetch(scriptUrl, {
                        method: 'POST',
                        mode: 'no-cors', // Apps Script requires no-cors for simple POSTs
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...formData, action: "add" })
                    });
                    setShowModal(false);
                    // Since no-cors doesn't return data, we wait and refresh
                    setTimeout(fetchTrips, 1500);
                } catch (err) { console.error(err); }
            };

            const handleDelete = async (id) => {
                if (!window.confirm("ต้องการลบใช่หรือไม่?")) return;
                try {
                    await fetch(scriptUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, action: "delete" })
                    });
                    setTimeout(fetchTrips, 1000);
                } catch (err) { console.error(err); }
            };

            const provinceStats = useMemo(() => {
                const counts = {};
                trips.forEach(t => { counts[t.province] = (counts[t.province] || 0) + 1; });
                return counts;
            }, [trips]);

            const stats = useMemo(() => {
                const visitedCount = Object.keys(provinceStats).length;
                return {
                    count: visitedCount,
                    days: trips.reduce((acc, t) => acc + Number(t.duration || 0), 0),
                    km: trips.reduce((acc, t) => acc + Number(t.distance || 0), 0),
                    pct: Math.round((visitedCount / 77) * 100)
                };
            }, [trips, provinceStats]);

            const getMapColor = (p) => {
                const c = provinceStats[p] || 0;
                if (c === 0) return 'bg-slate-100 text-slate-400';
                if (c === 1) return 'bg-emerald-200 text-emerald-800 shadow-sm';
                if (c === 2) return 'bg-emerald-400 text-emerald-900 shadow-md';
                if (c >= 3) return 'bg-emerald-700 text-white shadow-lg ring-2 ring-emerald-900/10';
                return 'bg-slate-100';
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-emerald-950 flex items-center justify-center p-6 relative overflow-hidden">
                        <Icon name="Mountain" size={300} className="absolute -bottom-20 -left-20 text-white/5 rotate-12" />
                        <div className="max-w-md w-full text-center relative z-10">
                            <div className="bg-white/10 w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-white/20 backdrop-blur-xl">
                                <Icon name="Compass" size={48} className="text-white animate-pulse" />
                            </div>
                            <h1 className="text-4xl font-black text-white italic tracking-tighter mb-10 uppercase">XJ95 JOURNEY</h1>
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl">
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Access Key Required</label>
                                    <input 
                                        type="password" 
                                        required 
                                        className="w-full p-5 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-emerald-600 outline-none text-center text-2xl font-bold tracking-widest" 
                                        value={password} 
                                        onChange={e => {setPassword(e.target.value); if(loginError) setLoginError(false);}} 
                                    />
                                    {loginError && <p className="text-red-500 text-[10px] font-bold uppercase tracking-widest animate-bounce">Access Denied</p>}
                                    <button className="w-full py-5 bg-emerald-900 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-emerald-950 transition-all active:scale-95 shadow-xl shadow-emerald-100 flex items-center justify-center gap-2">
                                        Authenticate <Icon name="ChevronRight" size={18} />
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-emerald-900 text-white sticky top-0 z-30 shadow-lg px-6 h-16 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <Icon name="Trees" size={24} />
                            <div>
                                <h1 className="text-xl font-black italic tracking-tighter leading-none">XJ95 JOURNEY</h1>
                                <p className="text-[9px] font-bold text-emerald-300 uppercase tracking-widest">Satellite Data Sync</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="bg-emerald-950/50 p-1 rounded-xl flex gap-1">
                                <button onClick={() => setCurrentView('map')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black tracking-widest transition-all ${currentView === 'map' ? 'bg-emerald-700 text-white' : 'text-emerald-400'}`}>MAP</button>
                                <button onClick={() => setCurrentView('feed')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black tracking-widest transition-all ${currentView === 'feed' ? 'bg-emerald-700 text-white' : 'text-emerald-400'}`}>FEED</button>
                            </div>
                            <button onClick={() => setShowModal(true)} className="bg-white text-emerald-900 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">+ RECORD</button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto w-full p-6 py-10">
                        {/* Dashboard Stats */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
                            <div className="bg-emerald-800 text-white p-6 rounded-[2rem] shadow-xl relative overflow-hidden group">
                                <Icon name="Mountain" size={100} className="absolute -bottom-4 -right-4 text-white/10 group-hover:scale-110 transition-transform" />
                                <div className="relative z-10">
                                    <p className="text-[10px] font-black text-emerald-300 uppercase mb-2 tracking-widest">Conquered</p>
                                    <div className="text-4xl font-black">{stats.count} <span className="text-lg font-normal opacity-40">/ 77</span></div>
                                    <div className="w-full bg-black/20 h-1 rounded-full mt-4 overflow-hidden">
                                        <div className="bg-white h-full transition-all duration-1000" style={{ width: `${stats.pct}%` }}></div>
                                    </div>
                                    <p className="text-[9px] mt-2 font-black uppercase opacity-60 tracking-widest">Progress: {stats.pct}%</p>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                                <p className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Expedition Time</p>
                                <div className="text-3xl font-black">{stats.days} <span className="text-sm font-bold opacity-30">DAYS</span></div>
                            </div>
                            <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                                <p className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">XJ95 Mileage</p>
                                <div className="text-3xl font-black">{stats.km.toLocaleString()} <span className="text-sm font-bold opacity-30">KM</span></div>
                            </div>
                            <div className="bg-emerald-50 p-6 rounded-[2rem] border border-emerald-100 flex flex-col justify-center">
                                <p className="text-[10px] font-black text-emerald-800 uppercase mb-1 tracking-widest">Status</p>
                                <div className="text-xl font-black italic text-emerald-900 tracking-tighter">
                                    {stats.count > 50 ? "LEGENDARY" : stats.count > 20 ? "VETERAN" : "EXPLORER"}
                                </div>
                            </div>
                        </div>

                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-32 text-emerald-800 gap-4">
                                <Icon name="Compass" size={48} className="animate-spin" />
                                <span className="font-black text-xs tracking-[0.3em] uppercase">Syncing Sheet Data...</span>
                            </div>
                        ) : currentView === 'map' ? (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100 overflow-x-auto">
                                    <div className="min-w-[800px] flex flex-col items-center">
                                        <div className="grid gap-2">
                                            {MAP_GRID.map((row, rIdx) => (
                                                <div key={rIdx} className="flex gap-2 justify-center">
                                                    {row.map((p, pIdx) => {
                                                        if (!p) return <div key={pIdx} className="w-24 h-20"></div>;
                                                        const count = provinceStats[p] || 0;
                                                        return (
                                                            <div 
                                                                key={pIdx} 
                                                                className={`w-24 h-20 rounded-2xl flex flex-col items-center justify-center p-3 text-center transition-all duration-300 transform hover:-translate-y-2 group relative cursor-default ${getMapColor(p)}`}
                                                            >
                                                                <span className="text-[10px] font-black leading-tight uppercase tracking-tighter">{p}</span>
                                                                {count > 0 && <span className="text-[10px] font-black mt-1 opacity-60">x{count}</span>}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in fade-in duration-500">
                                <div className="lg:col-span-2 space-y-6">
                                    <h2 className="text-2xl font-black text-slate-800 flex items-center gap-3 uppercase tracking-tighter italic mb-6">
                                        <Icon name="Trees" className="text-emerald-700" size={30} /> Journal Feed
                                    </h2>
                                    {trips.length === 0 ? (
                                        <div className="text-center py-32 bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                                            <Icon name="Compass" size={60} className="text-slate-200 mx-auto mb-6" />
                                            <h3 className="text-xl font-black text-slate-400 italic uppercase">No Trail Records Found.</h3>
                                        </div>
                                    ) : (
                                        trips.map(t => (
                                            <Card key={t.id} className="border-none shadow-md hover:shadow-xl transition-all duration-500 rounded-[2.5rem]">
                                                {t.imageUrl && (
                                                    <div className="h-[24rem] w-full overflow-hidden relative">
                                                        <img src={t.imageUrl} className="w-full h-full object-cover" alt="" />
                                                        <div className="absolute top-6 left-6 bg-emerald-950/80 backdrop-blur px-4 py-2 rounded-xl text-white text-[10px] font-black uppercase tracking-widest border border-white/10">
                                                            {t.province}
                                                        </div>
                                                    </div>
                                                )}
                                                <div className="p-10">
                                                    <div className="flex justify-between items-start mb-6">
                                                        <h3 className="text-3xl font-black text-slate-800 tracking-tighter italic uppercase">{t.title}</h3>
                                                        <button onClick={() => handleDelete(t.id)} className="p-3 text-slate-200 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all">
                                                            <Icon name="Trash2" size={24} />
                                                        </button>
                                                    </div>
                                                    <div className="flex flex-wrap gap-4 text-[10px] font-black text-emerald-900 mb-8 uppercase tracking-widest">
                                                        <div className="bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-100 flex items-center gap-2"><Icon name="Calendar" size={16}/> {t.date}</div>
                                                        <div className="bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-100 flex items-center gap-2"><Icon name="Clock" size={16}/> {t.duration} DAYS</div>
                                                        <div className="bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-100 flex items-center gap-2"><Icon name="Route" size={16}/> {t.distance} KM</div>
                                                    </div>
                                                    {t.notes && (
                                                        <p className="text-slate-600 leading-relaxed font-bold bg-slate-50/50 p-8 rounded-3xl border-l-[6px] border-emerald-800 italic text-lg">
                                                            "{t.notes}"
                                                        </p>
                                                    )}
                                                </div>
                                            </Card>
                                        ))
                                    )}
                                </div>
                                {/* Province Checklist Sidebar */}
                                <div className="hidden lg:block">
                                    <Card className="p-8 sticky top-24 shadow-xl border-none rounded-[2.5rem]">
                                        <div className="flex items-center justify-between mb-8">
                                            <h2 className="text-xl font-black uppercase tracking-tighter italic">Expedition Log</h2>
                                            <span className="text-[10px] font-black bg-emerald-950 text-white px-3 py-1.5 rounded-full">{stats.count}/77</span>
                                        </div>
                                        <div className="space-y-2 max-h-[calc(100vh-360px)] overflow-y-auto pr-4 custom-scrollbar">
                                            {THAI_PROVINCES.map(prov => {
                                                const count = provinceStats[prov] || 0;
                                                return (
                                                    <div key={prov} className={`flex items-center justify-between p-4 rounded-2xl transition-all ${count > 0 ? 'bg-emerald-900 text-white shadow-lg shadow-emerald-100' : 'text-slate-400 hover:bg-slate-100'}`}>
                                                        <span className="text-[11px] font-black uppercase tracking-tighter">{prov}</span>
                                                        {count > 0 && <span className="text-[9px] font-black bg-white/20 px-3 py-1 rounded-full">{count}X</span>}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Add Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-emerald-950/60 backdrop-blur-md animate-in fade-in duration-300">
                            <Card className="w-full max-w-xl relative z-10 animate-in zoom-in duration-300 border-none shadow-2xl rounded-[3rem]">
                                <form onSubmit={handleAdd}>
                                    <div className="p-10 bg-emerald-900 text-white flex justify-between items-center rounded-t-[3rem]">
                                        <div>
                                            <h2 className="text-3xl font-black uppercase tracking-tighter italic leading-none mb-1">New Expedition</h2>
                                            <p className="text-[10px] text-emerald-300 font-black uppercase tracking-widest">RECORDING XJ95 EXPEDITION COORDS</p>
                                        </div>
                                        <button type="button" onClick={() => setShowModal(false)} className="text-white/60 hover:text-white text-4xl font-light">&times;</button>
                                    </div>
                                    <div className="p-10 space-y-8 max-h-[65vh] overflow-y-auto custom-scrollbar">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Expedition Title</label>
                                            <input required placeholder="E.G. MOUNTAIN TRAIL 101" className="w-full px-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-4 focus:ring-emerald-700/10 outline-none font-black uppercase tracking-tighter text-lg" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Province</label>
                                                <select required className="w-full px-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-4 focus:ring-emerald-700/10 outline-none font-black uppercase text-sm appearance-none" value={formData.province} onChange={e => setFormData({...formData, province: e.target.value})}>
                                                    <option value="">SELECT REGION</option>
                                                    {THAI_PROVINCES.map(p => <option key={p} value={p}>{p}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Expedition Date</label>
                                                <input type="date" required className="w-full px-6 py-4 rounded-2xl bg-slate-50 font-bold" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Duration (Days)</label>
                                                <input type="number" min="1" className="w-full px-6 py-4 rounded-2xl bg-slate-50 font-black" value={formData.duration} onChange={e => setFormData({...formData, duration: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Distance (KM)</label>
                                                <input type="number" min="0" className="w-full px-6 py-4 rounded-2xl bg-slate-50 font-black" value={formData.distance} onChange={e => setFormData({...formData, distance: e.target.value})} />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Evidence Photo (URL)</label>
                                            <input type="url" placeholder="HTTPS://..." className="w-full px-6 py-4 rounded-2xl bg-slate-50 font-bold" value={formData.imageUrl} onChange={e => setFormData({...formData, imageUrl: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Journal Entry</label>
                                            <textarea rows="4" placeholder="DESCRIBE THE WILDERNESS..." className="w-full px-6 py-4 rounded-2xl bg-slate-50 outline-none resize-none font-bold text-slate-600 leading-relaxed" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})}></textarea>
                                        </div>
                                    </div>
                                    <div className="p-10 bg-slate-50 flex gap-6 rounded-b-[3rem]">
                                        <button type="button" onClick={() => setShowModal(false)} className="flex-1 py-4 text-slate-400 font-black uppercase tracking-widest hover:text-slate-600 transition-colors">Abort</button>
                                        <button type="submit" className="flex-1 py-5 bg-emerald-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-2xl shadow-emerald-200 hover:bg-emerald-950 transition-all active:scale-95">Record Trip</button>
                                    </div>
                                </form>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
