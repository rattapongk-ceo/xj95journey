        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(sessionStorage.getItem('xj95_auth') === 'true');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [trips, setTrips] = useState([]);
            const [maintenanceLogs, setMaintenanceLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentView, setCurrentView] = useState('map');
            const [showTripModal, setShowTripModal] = useState(false);
            const [showPMModal, setShowPMModal] = useState(false);
            const [selectedTask, setSelectedTask] = useState(null);
            
            const [formData, setFormData] = useState({ title: '', province: '', date: new Date().toISOString().split('T')[0], duration: 1, distance: 0, imageUrl: '', notes: '' });
            const [pmFormData, setPmFormData] = useState({ mileage: '', date: new Date().toISOString().split('T')[0], notes: '' });

            const fetchData = async () => {
                try {
                    setLoading(true);
                    const res = await fetch(scriptUrl);
                    const data = await res.json();
                    setTrips(data.trips.filter(item => item.id));
                    setMaintenanceLogs(data.maintenance.filter(item => item.id));
                } catch (err) { console.error("Fetch Error:", err); }
                finally { setLoading(false); }
            };

            useEffect(() => {
                if (isAuthenticated) fetchData();
            }, [isAuthenticated]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === ACCESS_PASSWORD) {
                    setIsAuthenticated(true);
                    sessionStorage.setItem('xj95_auth', 'true');
                } else { setLoginError(true); }
            };

            const handleAddTrip = async (e) => {
                e.preventDefault();
                try {
                    await fetch(scriptUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...formData, type: "trip", action: "add" })
                    });
                    setShowTripModal(false);
                    setTimeout(fetchData, 1500);
                } catch (err) { console.error(err); }
            };

            const handleAddPM = async (e) => {
                e.preventDefault();
                try {
                    await fetch(scriptUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...pmFormData, taskName: selectedTask.name, type: "pm", action: "add" })
                    });
                    setShowPMModal(false);
                    setTimeout(fetchData, 1500);
                } catch (err) { console.error(err); }
            };

            const handleDeleteTrip = async (id) => {
                if (!window.confirm("ต้องการลบบันทึกการเดินทางนี้ใช่หรือไม่?")) return;
                try {
                    await fetch(scriptUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, type: "trip", action: "delete" })
                    });
                    setTimeout(fetchData, 1000);
                } catch (err) { console.error(err); }
            };

            const provinceStats = useMemo(() => {
                const counts = {};
                trips.forEach(t => { counts[t.province] = (counts[t.province] || 0) + 1; });
                return counts;
            }, [trips]);

            const stats = useMemo(() => {
                const visitedCount = Object.keys(provinceStats).length;
                return {
                    count: visitedCount,
                    days: trips.reduce((acc, t) => acc + Number(t.duration || 0), 0),
                    km: trips.reduce((acc, t) => acc + Number(t.distance || 0), 0),
                    pct: Math.round((visitedCount / 77) * 100)
                };
            }, [trips, provinceStats]);

            const getLastService = (taskName) => {
                const logs = maintenanceLogs.filter(l => l.taskName === taskName);
                if (logs.length === 0) return null;
                return logs.sort((a, b) => new Date(b.date) - new Date(a.date))[0];
            };

            const getMapColor = (p) => {
                const c = provinceStats[p] || 0;
                if (c === 0) return 'bg-slate-100 text-slate-400';
                if (c === 1) return 'bg-emerald-200 text-emerald-800 shadow-sm';
                if (c === 2) return 'bg-emerald-400 text-emerald-900 shadow-md';
                if (c >= 3) return 'bg-emerald-700 text-white shadow-lg ring-2 ring-emerald-900/10';
                return 'bg-slate-100';
            };

            if (!isAuthenticated) {
                return (

                        <Icon name="Mountain" size={300} className="absolute -bottom-20 -left-20 text-white/5 rotate-12" />

                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto w-full p-6 py-10">
                        {/* Summary Stats */}

                                    <p className="text-[10px] font-black text-emerald-300 uppercase mb-2 tracking-widest">Conquered</p>
                                    <div className="text-4xl font-black">{stats.count} <span className="text-lg font-normal opacity-40">/ 77</span></div>
                                    <div className="w-full bg-black/20 h-1 rounded-full mt-4 overflow-hidden">
                                        <div className="bg-white h-full transition-all duration-1000" style={{ width: `${stats.pct}%` }}></div>
                                    </div>
                                    <p className="text-[9px] mt-2 font-black uppercase opacity-60 tracking-widest">Progress: {stats.pct}%</p>
                                </div>
                            </Card>
                            <Card className="p-6">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Expedition Time</span>
                                    <Icon name="Clock" size={18} className="text-emerald-700" />
                                </div>
                                <div className="text-3xl font-black">{stats.days} <span className="text-sm font-bold opacity-30 uppercase">Days</span></div>
                            </Card>
                            <Card className="p-6">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">XJ95 Mileage</span>
                                    <Icon name="Route" size={18} className="text-emerald-700" />
                                </div>
                                <div className="text-3xl font-black">{stats.km.toLocaleString()} <span className="text-sm font-bold opacity-30 uppercase">KM</span></div>
                            </Card>
                            <Card className="p-6 bg-emerald-50 border-emerald-100 flex flex-col justify-center">
                                <p className="text-[10px] font-black text-emerald-800 uppercase mb-1 tracking-widest">Status</p>
                                <div className="text-xl font-black italic text-emerald-900 tracking-tighter uppercase leading-tight italic">
                                    {stats.count > 50 ? "LEGENDARY" : stats.count > 20 ? "VETERAN" : "EXPLORER"}
                                </div>
                            </Card>
                        </div>

                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-32 text-emerald-800 gap-4">
                                <Icon name="Compass" size={48} className="animate-spin" />
                                <span className="font-black text-xs tracking-[0.3em] uppercase">Syncing Satellite Data...</span>
                            </div>
                        ) : currentView === 'pm' ? (
                            <div className="space-y-10 animate-fade-in text-slate-900">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-3xl font-black italic uppercase tracking-tighter italic">Jeep Maintenance</h2>
                                    <div className="flex items-center gap-2 text-emerald-700 font-bold text-xs bg-emerald-50 px-4 py-2 rounded-full border border-emerald-100">
                                        <Icon name="Settings" size={14} /> XJ95 PM STATUS: ACTIVE
                                    </div>
                                </div>
                                {MAINTENANCE_PLAN.map((section, sIdx) => (
                                    <div key={sIdx} className="space-y-4">
                                        <div className="flex items-baseline gap-4 border-b-4 border-emerald-900 pb-2">
                                            <h3 className="text-xl font-black uppercase italic">{section.category}</h3>
                                            <span className="text-emerald-600 font-black text-[10px] uppercase tracking-widest">{section.interval}</span>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {section.tasks.map(task => {
                                                const lastService = getLastService(task.name);
                                                return (
                                                    <Card key={task.id} className="p-6 flex flex-col justify-between group hover:shadow-md transition-shadow">
                                                        <div>
                                                            <h4 className="text-lg font-black text-slate-800 mb-1">{task.name}</h4>
                                                            <p className="text-xs text-slate-500 font-medium leading-relaxed mb-4">{task.info}</p>
                                                        </div>
                                                        <div className="flex justify-between items-end mt-4">
                                                            <div className="text-[10px] font-black uppercase text-slate-400">
                                                                Last Log: {lastService ? <span className="text-emerald-700">{new Date(lastService.date).toLocaleDateString()} ({lastService.mileage} km)</span> : "N/A"}
                                                            </div>
                                                            <button onClick={() => { setSelectedTask(task); setShowPMModal(true); }} className="bg-slate-900 text-white p-2.5 rounded-xl hover:bg-emerald-700 transition-colors shadow-lg">
                                                                <Icon name="Wrench" size={16} />
                                                            </button>
                                                        </div>
                                                    </Card>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : currentView === 'map' ? (
                            <div className="space-y-8 animate-fade-in text-slate-900">
                                <Card className="p-10 bg-white shadow-xl border-none overflow-x-auto rounded-[3rem]">
                                    <div className="min-w-[800px] flex flex-col items-center">
                                        <div className="grid gap-2">
                                            {MAP_GRID.map((row, rIdx) => (
                                                <div key={rIdx} className="flex gap-2 justify-center">
                                                    {row.map((p, pIdx) => {
                                                        if (!p) return <div key={pIdx} className="w-24 h-20"></div>;
                                                        const count = provinceStats[p] || 0;
                                                        const colorClass = getMapColor(p);
                                                        return (
                                                            <div 
                                                                key={pIdx} 
                                                                className={`w-24 h-20 rounded-2xl flex flex-col items-center justify-center p-3 text-center transition-all duration-300 transform hover:-translate-y-2 group relative cursor-default ${colorClass}`}
                                                            >
                                                                <span className="text-[10px] font-black leading-tight uppercase tracking-tighter">{p}</span>
                                                                {count > 0 && <span className="text-[10px] font-black mt-1.5 opacity-60">x{count}</span>}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </Card>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-fade-in text-slate-900">
                                <div className="lg:col-span-2 space-y-6">
                                    <h2 className="text-2xl font-black text-slate-800 flex items-center gap-3 uppercase tracking-tighter italic mb-6">
                                        <Icon name="Trees" className="text-emerald-700" size={30} /> Journal Feed
                                    </h2>
                                    {trips.length === 0 ? (
                                        <div className="text-center py-32 bg-white rounded-[3rem] border-2 border-dashed border-slate-200 shadow-sm">
                                            <Icon name="Compass" size={60} className="text-slate-200 mx-auto mb-6" />
                                            <h3 className="text-xl font-black text-slate-400 italic uppercase">No Trail Records Found.</h3>
                                        </div>
                                    ) : (
                                        trips.map(t => (
                                            <Card key={t.id} className="border-none shadow-md hover:shadow-xl transition-all duration-500 rounded-[2.5rem] group">
                                                {t.imageUrl && (
                                                    <div className="h-[24rem] w-full overflow-hidden relative">
                                                        <img src={t.imageUrl} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="" />
                                                        <div className="absolute top-6 left-6 bg-emerald-950/80 backdrop-blur px-4 py-2 rounded-xl text-white text-[10px] font-black uppercase tracking-widest border border-white/20">
                                                            {t.province}
                                                        </div>
                                                    </div>
                                                )}
                                                <div className="p-10 text-slate-900">
                                                    <div className="flex justify-between items-start mb-6">
                                                        <h3 className="text-3xl font-black text-slate-800 tracking-tighter italic uppercase">{t.title}</h3>
                                                        <button onClick={() => handleDeleteTrip(t.id)} className="p-3 text-slate-200 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all">
                                                            <Icon name="Trash2" size={24} />
                                                        </button>
                                                    </div>
                                                    <div className="flex flex-wrap gap-4 text-[10px] font-black text-emerald-900 mb-8 uppercase tracking-widest">
                                                        <div className="bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-100 flex items-center gap-2 shadow-sm"><Icon name="Calendar" size={16}/> {t.date}</div>
                                                        <div className="bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-100 flex items-center gap-2 shadow-sm"><Icon name="Clock" size={16}/> {t.duration} DAYS</div>
                                                        <div className="bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-100 flex items-center gap-2 shadow-sm"><Icon name="Route" size={16}/> {t.distance} KM</div>
                                                    </div>
                                                    {t.notes && (
                                                        <p className="text-slate-600 leading-relaxed font-bold bg-slate-50/50 p-8 rounded-3xl border-l-[6px] border-emerald-800 italic text-lg shadow-inner">
                                                            "{t.notes}"
                                                        </p>
                                                    )}
                                                </div>
                                            </Card>
                                        ))
                                    )}
                                </div>
                                <div className="hidden lg:block text-slate-900">
                                    <Card className="p-8 sticky top-24 shadow-xl border-none rounded-[2.5rem]">
                                        <div className="flex items-center justify-between mb-8">
                                            <h2 className="text-xl font-black uppercase tracking-tighter italic">Expedition Log</h2>
                                            <span className="text-[10px] font-black bg-emerald-950 text-white px-3 py-1.5 rounded-full shadow-lg">{stats.count}/77</span>
                                        </div>
                                        <div className="space-y-2 max-h-[calc(100vh-360px)] overflow-y-auto pr-4 custom-scrollbar">
                                            {THAI_PROVINCES.map(prov => {
                                                const count = provinceStats[prov] || 0;
                                                return (
                                                    <div key={prov} className={`flex items-center justify-between p-4 rounded-2xl transition-all ${count > 0 ? 'bg-emerald-900 text-white shadow-lg shadow-emerald-100' : 'text-slate-400 hover:bg-slate-50'}`}>
                                                        <span className="text-[11px] font-black uppercase tracking-tighter">{prov}</span>
                                                        {count > 0 && <span className="text-[9px] font-black bg-white/20 px-3 py-1 rounded-full">{count}X</span>}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* PM Modal */}
                    {showPMModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-emerald-950/60 backdrop-blur-md animate-in fade-in duration-300 text-slate-900">
                            <Card className="w-full max-w-md p-10 animate-in shadow-2xl border-none">
                                <h2 className="text-2xl font-black italic uppercase mb-2 border-b-4 border-emerald-900 pb-2">Record Service</h2>
                                <p className="text-[10px] font-black text-emerald-700 uppercase mb-8 tracking-widest italic leading-tight">{selectedTask?.name}</p>
                                <form onSubmit={handleAddPM} className="space-y-6">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Mileage (KM)</label>
                                        <input required type="number" className="w-full p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={pmFormData.mileage} onChange={e => setPmFormData({...pmFormData, mileage: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Date</label>
                                        <input required type="date" className="w-full p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={pmFormData.date} onChange={e => setPmFormData({...pmFormData, date: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Notes</label>
                                        <textarea className="w-full p-4 rounded-2xl bg-slate-50 font-medium outline-none border-2 border-transparent focus:border-emerald-600" value={pmFormData.notes} onChange={e => setPmFormData({...pmFormData, notes: e.target.value})}></textarea>
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => setShowPMModal(false)} className="flex-1 font-black text-slate-400 uppercase tracking-widest hover:text-slate-600">Cancel</button>
                                        <button type="submit" className="flex-1 py-4 bg-emerald-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg hover:bg-emerald-950">Save Record</button>
                                    </div>
                                </form>
                            </Card>
                        </div>
                    )}

                    {/* Trip Modal */}
                    {showTripModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-emerald-950/60 backdrop-blur-md animate-in fade-in duration-300 text-slate-900 text-slate-900">
                            <Card className="w-full max-w-xl p-10 animate-in overflow-y-auto max-h-[90vh] shadow-2xl border-none">
                                <h2 className="text-2xl font-black italic uppercase mb-8 border-b-4 border-emerald-900 pb-2 italic leading-tight">New Trail Log</h2>
                                <form onSubmit={handleAddTrip} className="space-y-6">
                                    <input required placeholder="TRIP TITLE" className="w-full p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600 uppercase tracking-widest" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select required className="p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={formData.province} onChange={e => setFormData({...formData, province: e.target.value})}>
                                            <option value="">PROVINCE</option>
                                            {THAI_PROVINCES.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                        <input type="date" className="p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="DAYS" className="p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={formData.duration} onChange={e => setFormData({...formData, duration: e.target.value})} />
                                        <input type="number" placeholder="DISTANCE (KM)" className="p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={formData.distance} onChange={e => setFormData({...formData, distance: e.target.value})} />
                                    </div>
                                    <input placeholder="IMAGE URL" className="w-full p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={formData.imageUrl} onChange={e => setFormData({...formData, imageUrl: e.target.value})} />
                                    <textarea placeholder="JOURNAL ENTRY" className="w-full p-4 rounded-2xl bg-slate-50 font-medium outline-none border-2 border-transparent focus:border-emerald-600" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})}></textarea>
                                    <div className="flex gap-4">
                                        <button type="button" onClick={() => setShowTripModal(false)} className="flex-1 font-black text-slate-400 uppercase tracking-widest hover:text-slate-600">Abort</button>
                                        <button type="submit" className="flex-1 py-4 bg-emerald-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg">Record</button>
                                    </div>
                                </form>
                            </Card>
                        </div>
                    )}

                    <button onClick={() => setShowTripModal(true)} className="lg:hidden fixed bottom-8 right-8 bg-emerald-900 text-white w-20 h-20 rounded-[2rem] flex items-center justify-center shadow-[0_20px_50px_rgba(5,150,105,0.4)] z-10 active:scale-90 transition-all">
                        <Icon name="Plus" size={40} />
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
