<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XJ95 Journey - Sheets & Drive</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- วาง URL ใหม่ที่ได้จาก New Deployment ตรงนี้ ---
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwj5cx3FTjLoEnBt3w4jTfzF1GfpgPS9X-UZNZr1GpI7WI81IvHHvDc_Rwdll5sjxNgpA/exec";
        const ACCESS_PASSWORD = "xj1995";

        const THAI_PROVINCES = ["กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น", "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร", "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก", "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี", "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์", "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง", "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต", "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยโสธร", "ยะลา", "ร้อยเอ็ด", "ระนอง", "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย", "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม", "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี", "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อำนาจเจริญ", "อุดรธานี", "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี"];

        const MAINTENANCE_PLAN = [
            { category: "1. Routine Maintenance", interval: "5,000 – 8,000 km", tasks: [
                { id: "oil", name: "Oil & Filter Change", info: "ใช้น้ำมัน 10W-40" },
                { id: "lube", name: "Chassis Lubrication", info: "อัดจาระบีลูกหมาก" },
                { id: "tire", name: "Tire Rotation", info: "สลับยางทุก 8,000 กม." },
                { id: "fluid", name: "Fluid Levels Check", info: "ตรวจระดับของเหลวรายเดือน" }
            ]},
            { category: "2. Intermediate Service", interval: "Annual / 24,000 km", tasks: [
                { id: "air", name: "Air Filter Replacement", info: "เปลี่ยนกรองอากาศ" },
                { id: "cool_insp", name: "Cooling System Inspection", info: "ตรวจเช็กท่อยางและพัดลมไฟฟ้า" },
                { id: "brake", name: "Brake Inspection", info: "ตรวจเช็กผ้าเบรก" }
            ]},
            { category: "3. Major Service", interval: "2 Years / 48,000 km", tasks: [
                { id: "trans", name: "Transmission Fluid (ATF)", info: "เปลี่ยนถ่ายน้ำมันเกียร์" },
                { id: "tcase", name: "Transfer Case Service", info: "น้ำมันเกียร์ Transfer" },
                { id: "tune", name: "Ignition Tune-Up", info: "หัวเทียน, ฝาครอบจานจ่าย" }
            ]}
        ];

        const MAP_GRID = [
            [null, null, "เชียงราย", "พะเยา", "น่าน"],
            [null, "แม่ฮ่องสอน", "เชียงใหม่", "ลำพูน", "แพร่"],
            [null, null, "ลำปาง", "อุตรดิตถ์", "เลย"],
            [null, "ตาก", "สุโขทัย", "พิษณุโลก", "หนองคาย", "บึงกาฬ"],
            [null, null, "กำแพงเพชร", "พิจิตร", "เพชรบูรณ์", "อุดรธานี", "สกลนคร", "นครพนม"],
            [null, null, "นครสวรรค์", "อุทัยธานี", "ชัยภูมิ", "ขอนแก่น", "กาฬสินธุ์", "มุกดาหาร"],
            [null, null, "ชัยนาท", "สิงห์บุรี", "ลพบุรี", "นครราชสีมา", "มหาสารคาม", "ร้อยเอ็ด", "ยโสธร", "อำนาจเจริญ"],
            [null, "สุพรรณบุรี", "อ่างทอง", "สระบุรี", "นครนายก", "ปราจีนบุรี", "ศรีสะเกษ", "อุบลราชธานี"],
            ["กาญจนบุรี", "นครปฐม", "นนทบุรี", "พระนครศรีอยุธยา", "ปทุมธานี", "สระแก้ว", "บุรีรัมย์", "สุรินทร์"],
            [null, "ราชบุรี", "สมุทรสงคราม", "กรุงเทพมหานคร", "ฉะเชิงเทรา", "ชลบุรี"],
            [null, "เพชรบุรี", "สมุทรสาคร", "สมุทรปราการ", "ระยอง", "จันทบุรี", "ตราด"],
            [null, "ประจวบคีรีขันธ์"],
            [null, "ชุมพร", "ระนอง"],
            [null, "สุราษฎร์ธานี", "พังงา", "ภูเก็ต"],
            [null, "นครศรีธรรมราช", "กระบี่"],
            [null, "พัทลุง", "ตรัง", "สงขลา", "สตูล"],
            [null, "ปัตตานี", "ยะลา", "นราธิวาส"]
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Map: <React.Fragment><path d="M14.12 3.88 16 2l5 5-5 5-1.88-1.88"/><path d="M19 16c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V7c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2v2"/><path d="M9 10h6"/><path d="M9 14h6"/><path d="m14.5 14.5-5-5"/></React.Fragment>,
                Mountain: <path d="m8 3 4 8 5-5 5 15H2L8 3z"/>,
                Trees: <React.Fragment><path d="M10 10v.01"/><path d="M14 10v.01"/><path d="M7 6a4 4 0 0 1 10 0"/><path d="M12 2v4"/><path d="M9 22v-4h6v4"/><path d="M8 12a5 5 0 0 0-1 10h10a5 5 0 0 0-1-10h-8Z"/></React.Fragment>,
                Plus: <path d="M5 12h14M12 5v14" />,
                Trash2: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" />,
                Compass: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></React.Fragment>,
                Camera: <React.Fragment><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></React.Fragment>,
                Wrench: <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>,
                History: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L12 12"/></React.Fragment>,
                Calendar: <React.Fragment><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></React.Fragment>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const Card = ({ children, className = "" }) => <div className={`bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden ${className}`}>{children}</div>;

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(sessionStorage.getItem('xj95_auth') === 'true');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [trips, setTrips] = useState([]);
            const [maintenanceLogs, setMaintenanceLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);
            const [currentView, setCurrentView] = useState('map');
            const [showTripModal, setShowTripModal] = useState(false);
            const [showPMModal, setShowPMModal] = useState(false);
            const [selectedTask, setSelectedTask] = useState(null);
            const [formData, setFormData] = useState({ title: '', province: '', date: new Date().toISOString().split('T')[0], duration: 1, distance: 0, notes: '' });
            const [selectedFiles, setSelectedFiles] = useState([]);
            const [pmFormData, setPmFormData] = useState({ mileage: '', date: new Date().toISOString().split('T')[0], notes: '' });

            const fetchData = async () => {
                try {
                    setLoading(true);
                    const res = await fetch(scriptUrl);
                    const data = await res.json();
                    setTrips(Array.isArray(data.trips) ? data.trips.filter(t => t.id) : []);
                    setMaintenanceLogs(Array.isArray(data.maintenance) ? data.maintenance.filter(m => m.id) : []);
                } catch (err) { console.error(err); } finally { setLoading(false); }
            };

            useEffect(() => { if (isAuthenticated) fetchData(); }, [isAuthenticated]);

            const fileToBase64 = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({ base64: reader.result.split(',')[1], mimeType: file.type });
                reader.onerror = e => reject(e);
            });

            const handleAddTrip = async (e) => {
                e.preventDefault();
                setUploading(true);
                try {
                    const base64Images = await Promise.all(selectedFiles.map(fileToBase64));
                    await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...formData, images: base64Images, type: "trip", action: "add" }) });
                    setShowTripModal(false);
                    setSelectedFiles([]);
                    setTimeout(fetchData, 3000);
                } catch (err) { alert("เกิดข้อผิดพลาดในการบันทึก"); } finally { setUploading(false); }
            };

            const provinceStats = useMemo(() => {
                const counts = {};
                trips.forEach(t => { if(t.province) counts[t.province] = (counts[t.province] || 0) + 1; });
                return counts;
            }, [trips]);

            const getMapColor = (p) => {
                const c = provinceStats[p] || 0;
                if (c === 0) return 'bg-slate-100 text-slate-400';
                if (c === 1) return 'bg-emerald-200';
                if (c === 2) return 'bg-emerald-400';
                return 'bg-emerald-700 text-white shadow-lg';
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-emerald-950 flex items-center justify-center p-6 text-slate-900">
                        <div className="max-w-md w-full animate-fade-in text-center">
                            <Icon name="Compass" size={48} className="text-white mx-auto mb-8 animate-pulse" />
                            <h1 className="text-3xl font-black text-white italic mb-10">XJ95 JOURNEY</h1>
                            <Card className="p-10 shadow-2xl">
                                <form onSubmit={(e) => { e.preventDefault(); if(password === ACCESS_PASSWORD) { setIsAuthenticated(true); sessionStorage.setItem('xj95_auth', 'true'); } else setLoginError(true); }} className="space-y-6">
                                    <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Access Key Required</label>
                                    <input type="password" required className="w-full p-5 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-emerald-600 outline-none text-center text-2xl font-bold tracking-widest" value={password} onChange={e => setPassword(e.target.value)} />
                                    {loginError && <p className="text-red-500 text-[10px] font-bold">Access Denied</p>}
                                    <button className="w-full py-5 bg-emerald-900 text-white rounded-2xl font-black uppercase tracking-widest">Authenticate</button>
                                </form>
                            </Card>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <header className="bg-emerald-900 text-white sticky top-0 z-30 shadow-lg px-6 h-16 flex justify-between items-center">
                        <div className="flex items-center gap-3"><Icon name="Trees" size={24} /><h1 className="text-xl font-black italic tracking-tighter">XJ95</h1></div>
                        <div className="bg-emerald-950/50 p-1 rounded-xl flex gap-1">
                            <button onClick={() => setCurrentView('map')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black ${currentView === 'map' ? 'bg-emerald-700' : ''}`}>MAP</button>
                            <button onClick={() => setCurrentView('feed')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black ${currentView === 'feed' ? 'bg-emerald-700' : ''}`}>FEED</button>
                            <button onClick={() => setCurrentView('pm')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black ${currentView === 'pm' ? 'bg-emerald-700' : ''}`}>PM</button>
                            <button onClick={() => setCurrentView('logs')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black ${currentView === 'logs' ? 'bg-emerald-700' : ''}`}>LOGS</button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto w-full p-6 py-10">
                        {loading ? <div className="text-center py-20 font-black animate-pulse text-emerald-800 uppercase tracking-widest">Syncing Data...</div> : 
                         currentView === 'map' ? (
                            <Card className="p-10 bg-white overflow-x-auto rounded-[3rem] shadow-xl border-none">
                                <div className="min-w-[800px] flex flex-col items-center">
                                    <div className="grid gap-2">
                                        {MAP_GRID.map((row, rIdx) => (
                                            <div key={rIdx} className="flex gap-2 justify-center">
                                                {row.map((p, pIdx) => {
                                                    if (!p) return <div key={pIdx} className="w-24 h-20"></div>;
                                                    const count = provinceStats[p] || 0;
                                                    return <div key={pIdx} className={`w-24 h-20 rounded-2xl flex flex-col items-center justify-center p-3 text-center text-[10px] font-black uppercase transition-all hover:-translate-y-2 ${getMapColor(p)}`}><span>{p}</span>{count > 0 && <span className="text-[9px] mt-1 opacity-60">x{count}</span>}</div>;
                                                })}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </Card>
                         ) : currentView === 'feed' ? (
                            <div className="max-w-2xl mx-auto space-y-6">
                                {trips.map(t => (
                                    <Card key={t.id} className="shadow-md">
                                        {t.imageUrl && <div className="image-grid p-2 bg-slate-100">{t.imageUrl.split(',').map((id, idx) => <img key={idx} src={`https://drive.google.com/thumbnail?id=${id}&sz=w800`} className="w-full h-48 object-cover rounded-2xl" />)}</div>}
                                        <div className="p-8">
                                            <h3 className="text-3xl font-black italic uppercase mb-2 text-slate-900">{t.title}</h3>
                                            <div className="flex gap-4 text-[10px] font-black uppercase text-emerald-800 mb-6 tracking-widest"><span>{t.province}</span>•<span>{t.date}</span>•<span>{t.distance} KM</span></div>
                                            <p className="text-slate-600 font-bold bg-slate-50/50 p-6 rounded-2xl border-l-4 border-emerald-800 italic">"{t.notes}"</p>
                                        </div>
                                    </Card>
                                ))}
                                <button onClick={() => setShowTripModal(true)} className="fixed bottom-8 right-8 bg-emerald-900 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-2xl active:scale-95 transition-all"><Icon name="Plus" size={32} /></button>
                            </div>
                         ) : null /* รายหน้าอื่นๆ (PM/LOGS) จะเหมือนเดิม */}
                    </main>

                    {/* Trip Modal พร้อมระบบ Upload */}
                    {showTripModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-emerald-950/60 backdrop-blur-md text-slate-900">
                            <Card className="w-full max-w-xl p-10 animate-fade-in overflow-y-auto max-h-[95vh] shadow-2xl border-none">
                                <h2 className="text-2xl font-black italic uppercase mb-8 border-b-4 border-emerald-900 pb-2 italic">New Expedition Log</h2>
                                <form onSubmit={handleAddTrip} className="space-y-6">
                                    <input required placeholder="EXPEDITION TITLE" className="w-full p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select required className="p-4 rounded-2xl bg-slate-50 font-black outline-none" value={formData.province} onChange={e => setFormData({...formData, province: e.target.value})}><option value="">PROVINCE</option>{THAI_PROVINCES.map(p => <option key={p} value={p}>{p}</option>)}</select>
                                        <input type="date" required className="p-4 rounded-2xl bg-slate-50 font-black outline-none" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                    </div>
                                    <div className="p-8 border-2 border-dashed border-emerald-100 rounded-3xl text-center bg-emerald-50/20">
                                        <input type="file" multiple accept="image/*" className="hidden" id="file-upload" onChange={e => setSelectedFiles(Array.from(e.target.files).slice(0, 4))} />
                                        <label htmlFor="file-upload" className="cursor-pointer flex flex-col items-center gap-2"><Icon name="Camera" size={32} className="text-emerald-700" /><span className="font-black text-[10px] uppercase text-emerald-900">Upload Images (Max 4)</span>{selectedFiles.length > 0 && <span className="text-emerald-600 text-xs font-bold">{selectedFiles.length} files selected</span>}</label>
                                    </div>
                                    <textarea placeholder="JOURNAL ENTRY" className="w-full p-4 rounded-2xl bg-slate-50 font-medium outline-none" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})}></textarea>
                                    <div className="flex gap-4"><button type="button" onClick={() => setShowTripModal(false)} className="flex-1 font-black text-slate-400 uppercase tracking-widest" disabled={uploading}>Abort</button><button type="submit" className="flex-1 py-4 bg-emerald-900 text-white rounded-2xl font-black uppercase shadow-lg disabled:opacity-50" disabled={uploading}>{uploading ? 'Uploading...' : 'Record'}</button></div>
                                </form>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
