<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #059669; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Configuration ---
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwj5cx3FTjLoEnBt3w4jTfzF1GfpgPS9X-UZNZr1GpI7WI81IvHHvDc_Rwdll5sjxNgpA/exec";
        const ACCESS_PASSWORD = "xj1995";

        const THAI_PROVINCES = ["กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น", "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร", "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก", "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี", "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์", "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง", "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต", "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยโสธร", "ยะลา", "ร้อยเอ็ด", "ระนอง", "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย", "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม", "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี", "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อำนาจเจริญ", "อุดรธานี", "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี"];

        const MAINTENANCE_PLAN = [
            { category: "1. Routine Maintenance", interval: "5,000 – 8,000 km", tasks: [
                { id: "oil", name: "Oil & Filter Change", info: "ใช้น้ำมัน 10W-30 หรือ 10W-40 ที่มี Zinc สูง" },
                { id: "lube", name: "Chassis Lubrication", info: "อัดจาระบีลูกหมากต่างๆ" },
                { id: "tire", name: "Tire Rotation", info: "สลับยางทุก 8,000 กม." },
                { id: "fluid", name: "Fluid Levels Check", info: "ตรวจระดับของเหลวรายเดือน" }
            ]},
            { category: "2. Intermediate Service", interval: "Annual / 24,000 km", tasks: [
                { id: "air", name: "Air Filter Replacement", info: "เปลี่ยนกรองอากาศ" },
                { id: "cool_insp", name: "Cooling System Inspection", info: "ตรวจเช็กท่อยางและพัดลมไฟฟ้า" },
                { id: "brake", name: "Brake Inspection", info: "ตรวจเช็กผ้าเบรก" }
            ]},
            { category: "3. Major Service", interval: "2 Years / 48,000 km", tasks: [
                { id: "trans", name: "Transmission Fluid (ATF)", info: "เปลี่ยนถ่ายน้ำมันเกียร์" },
                { id: "tcase", name: "Transfer Case Service", info: "น้ำมันเกียร์ Transfer" },
                { id: "diff", name: "Differential Gear Oil", info: "น้ำมันเฟืองท้าย 80W-90" },
                { id: "tune", name: "Ignition Tune-Up", info: "หัวเทียน, ฝาครอบจานจ่าย" }
            ]}
        ];

        const MAP_GRID = [
            [null, null, "เชียงราย", "พะเยา", "น่าน"],
            [null, "แม่ฮ่องสอน", "เชียงใหม่", "ลำพูน", "แพร่"],
            [null, null, "ลำปาง", "อุตรดิตถ์", "เลย"],
            [null, "ตาก", "สุโขทัย", "พิษณุโลก", "หนองคาย", "บึงกาฬ"],
            [null, null, "กำแพงเพชร", "พิจิตร", "เพชรบูรณ์", "อุดรธานี", "สกลนคร", "นครพนม"],
            [null, null, "นครสวรรค์", "อุทัยธานี", "ชัยภูมิ", "ขอนแก่น", "กาฬสินธุ์", "มุกดาหาร"],
            [null, null, "ชัยนาท", "สิงห์บุรี", "ลพบุรี", "นครราชสีมา", "มหาสารคาม", "ร้อยเอ็ด", "ยโสธร", "อำนาจเจริญ"],
            [null, "สุพรรณบุรี", "อ่างทอง", "สระบุรี", "นครนายก", "ปราจีนบุรี", "ศรีสะเกษ", "อุบลราชธานี"],
            ["กาญจนบุรี", "นครปฐม", "นนทบุรี", "พระนครศรีอยุธยา", "ปทุมธานี", "สระแก้ว", "บุรีรัมย์", "สุรินทร์"],
            [null, "ราชบุรี", "สมุทรสงคราม", "กรุงเทพมหานคร", "ฉะเชิงเทรา", "ชลบุรี"],
            [null, "เพชรบุรี", "สมุทรสาคร", "สมุทรปราการ", "ระยอง", "จันทบุรี", "ตราด"],
            [null, "ประจวบคีรีขันธ์"],
            [null, "ชุมพร", "ระนอง"],
            [null, "สุราษฎร์ธานี", "พังงา", "ภูเก็ต"],
            [null, "นครศรีธรรมราช", "กระบี่"],
            [null, "พัทลุง", "ตรัง", "สงขลา", "สตูล"],
            [null, "ปัตตานี", "ยะลา", "นราธิวาส"]
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Map: <React.Fragment><path d="M14.12 3.88 16 2l5 5-5 5-1.88-1.88"/><path d="M19 16c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V7c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2v2"/><path d="M9 10h6"/><path d="M9 14h6"/><path d="m14.5 14.5-5-5"/></React.Fragment>,
                Mountain: <path d="m8 3 4 8 5-5 5 15H2L8 3z"/>,
                Trees: <React.Fragment><path d="M10 10v.01"/><path d="M14 10v.01"/><path d="M7 6a4 4 0 0 1 10 0"/><path d="M12 2v4"/><path d="M9 22v-4h6v4"/><path d="M8 12a5 5 0 0 0-1 10h10a5 5 0 0 0-1-10h-8Z"/></React.Fragment>,
                Plus: <path d="M5 12h14M12 5v14" />,
                Trash2: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" />,
                Compass: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></React.Fragment>,
                History: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L12 12"/></React.Fragment>,
                Camera: <React.Fragment><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></React.Fragment>,
                Wrench: <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>,
                Filter: <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/>,
                ArrowLeft: <path d="m12 19-7-7 7-7M5 12h14"/>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const Card = ({ children, className = "" }) => <div className={`bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden ${className}`}>{children}</div>;

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(sessionStorage.getItem('xj95_auth') === 'true');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [trips, setTrips] = useState([]);
            const [maintenanceLogs, setMaintenanceLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);
            const [currentView, setCurrentView] = useState('map');
            const [filterProvince, setFilterProvince] = useState(null);
            
            const [showTripModal, setShowTripModal] = useState(false);
            const [showPMModal, setShowPMModal] = useState(false);
            const [selectedTask, setSelectedTask] = useState(null);
            const [formData, setFormData] = useState({ title: '', province: '', date: new Date().toISOString().split('T')[0], duration: 1, distance: 0, notes: '' });
            const [selectedFiles, setSelectedFiles] = useState([]);
            const [pmFormData, setPmFormData] = useState({ mileage: '', date: new Date().toISOString().split('T')[0], notes: '' });

            const fetchData = async () => {
                try {
                    setLoading(true);
                    const res = await fetch(scriptUrl);
                    const data = await res.json();
                    setTrips(Array.isArray(data.trips) ? data.trips.filter(t => t.id) : []);
                    setMaintenanceLogs(Array.isArray(data.maintenance) ? data.maintenance.filter(m => Object.keys(m).length > 0) : []);
                } catch (err) { console.error(err); } finally { setLoading(false); }
            };

            useEffect(() => { if (isAuthenticated) fetchData(); }, [isAuthenticated]);

            // บีบอัดรูปภาพให้เล็กลงมาก (Max 1000px, Quality 0.5) เพื่อป้องกัน Payload limit ของ GAS
            const compressAndConvert = (file) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.5); // บีบอัด 50%
                        resolve({ base64: dataUrl.split(',')[1], mimeType: 'image/jpeg' });
                    };
                };
            });

            const handleAddTrip = async (e) => {
                e.preventDefault();
                setUploading(true);
                try {
                    const compressedImages = await Promise.all(selectedFiles.map(compressAndConvert));
                    
                    // ส่งข้อมูลแบบ POST ธรรมดาโดยไม่มี headers พิเศษเพื่อเลี่ยง CORS Preflight issue
                    const response = await fetch(scriptUrl, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify({ ...formData, images: compressedImages, type: "trip", action: "add" }) 
                    });
                    
                    setShowTripModal(false); 
                    setSelectedFiles([]);
                    setFormData({ title: '', province: '', date: new Date().toISOString().split('T')[0], duration: 1, distance: 0, notes: '' });
                    
                    // หน่วงเวลาให้ Google Server ทำงานแป๊บนึงก่อนดึงค่าใหม่
                    setTimeout(fetchData, 3500);
                } catch (err) { 
                    alert("เกิดข้อผิดพลาด: อาจเกิดจากรูปภาพขนาดใหญ่เกินไป หรืออินเทอร์เน็ตไม่เสถียร"); 
                } finally { setUploading(false); }
            };

            const handleAddPM = async (e) => {
                e.preventDefault();
                try {
                    await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...pmFormData, taskName: selectedTask.name, type: "pm", action: "add" }) });
                    setShowPMModal(false); setTimeout(fetchData, 1500);
                } catch (err) { console.error(err); }
            };

            const handleProvinceClick = (province) => {
                if (provinceStats[province] > 0) {
                    setFilterProvince(province);
                    setCurrentView('feed');
                }
            };

            const provinceStats = useMemo(() => {
                const counts = {};
                trips.forEach(t => { if(t.province) counts[t.province] = (counts[t.province] || 0) + 1; });
                return counts;
            }, [trips]);

            const stats = useMemo(() => {
                const visitedCount = Object.keys(provinceStats).length;
                return {
                    count: visitedCount,
                    days: trips.reduce((acc, t) => acc + Number(t.duration || 0), 0),
                    km: trips.reduce((acc, t) => acc + Number(t.distance || 0), 0),
                    pct: Math.round((visitedCount / 77) * 100)
                };
            }, [trips, provinceStats]);

            const filteredTrips = useMemo(() => {
                if (!filterProvince) return trips;
                return trips.filter(t => t.province === filterProvince);
            }, [trips, filterProvince]);

            const getMapColor = (p) => {
                const c = provinceStats[p] || 0;
                if (c === 0) return 'bg-slate-100 text-slate-400 opacity-40';
                if (c === 1) return 'bg-emerald-200 text-emerald-900 cursor-pointer';
                if (c === 2) return 'bg-emerald-400 text-emerald-950 cursor-pointer ring-1 ring-emerald-500';
                return 'bg-emerald-700 text-white shadow-lg cursor-pointer ring-2 ring-emerald-900';
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-emerald-950 flex items-center justify-center p-6 text-slate-900 text-slate-900">
                        <div className="max-w-md w-full animate-fade-in text-center">
                            <Icon name="Compass" size={48} className="text-white mx-auto mb-8 animate-pulse" />
                            <h1 className="text-3xl font-black text-white italic mb-10 uppercase tracking-tighter">XJ95 JOURNEY</h1>
                            <Card className="p-10 shadow-2xl">
                                <form onSubmit={(e) => { e.preventDefault(); if(password === ACCESS_PASSWORD) { setIsAuthenticated(true); sessionStorage.setItem('xj95_auth', 'true'); } else setLoginError(true); }} className="space-y-6">
                                    <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Access Key Required</label>
                                    <input type="password" required className="w-full p-5 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-emerald-600 outline-none text-center text-2xl font-bold tracking-widest" value={password} onChange={e => setPassword(e.target.value)} />
                                    {loginError && <p className="text-red-500 text-[10px] font-bold">Access Denied</p>}
                                    <button className="w-full py-5 bg-emerald-900 text-white rounded-2xl font-black uppercase tracking-widest">Authenticate</button>
                                </form>
                            </Card>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 text-slate-900">
                    <header className="bg-emerald-900 text-white sticky top-0 z-30 shadow-lg px-6 h-16 flex justify-between items-center">
                        <div className="flex items-center gap-3"><Icon name="Trees" size={24} /><h1 className="text-xl font-black italic tracking-tighter uppercase leading-none">XJ95 JOURNEY</h1></div>
                        <div className="bg-emerald-950/50 p-1 rounded-xl flex gap-1">
                            {['map', 'feed', 'pm', 'logs'].map(view => (
                                <button key={view} onClick={() => { setCurrentView(view); if(view !== 'feed') setFilterProvince(null); }} className={`px-4 py-1.5 rounded-lg text-[10px] font-black tracking-widest transition-all ${currentView === view ? 'bg-emerald-700 text-white shadow-sm' : 'text-emerald-400'}`}>{view.toUpperCase()}</button>
                            ))}
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto w-full p-6 py-10">
                        {/* Summary Dashboard - แสดงทุกหน้า */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10 animate-fade-in text-slate-900">
                            <Card className="p-6 bg-emerald-800 border-none text-white shadow-xl relative overflow-hidden group">
                                <Icon name="Mountain" size={100} className="absolute -bottom-4 -right-4 text-white/10 group-hover:scale-110 transition-transform" />
                                <div className="relative z-10 text-white">
                                    <p className="text-[10px] font-black text-emerald-300 uppercase mb-2 tracking-widest leading-none">Conquered</p>
                                    <div className="text-4xl font-black leading-none mb-2">{stats.count} <span className="text-lg font-normal opacity-40">/ 77</span></div>
                                    <div className="w-full bg-black/20 h-1 rounded-full overflow-hidden">
                                        <div className="bg-white h-full transition-all duration-1000" style={{ width: `${stats.pct}%` }}></div>
                                    </div>
                                    <p className="text-[9px] mt-2 font-black uppercase opacity-60 tracking-widest leading-none text-white">Progress: {stats.pct}%</p>
                                </div>
                            </Card>
                            <Card className="p-6">
                                <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2 flex justify-between">Expedition Time <Icon name="History" size={14} className="text-emerald-700" /></p>
                                <div className="text-3xl font-black text-slate-800 leading-none">{stats.days} <span className="text-sm font-bold opacity-30 uppercase">Days</span></div>
                            </Card>
                            <Card className="p-6">
                                <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2 flex justify-between">XJ95 Mileage <Icon name="Compass" size={14} className="text-emerald-700" /></p>
                                <div className="text-3xl font-black text-slate-800 leading-none">{stats.km.toLocaleString()} <span className="text-sm font-bold opacity-30 uppercase">KM</span></div>
                            </Card>
                            <Card className="p-6 bg-emerald-50 border-emerald-100 flex flex-col justify-center text-center">
                                <p className="text-[10px] font-black text-emerald-800 uppercase mb-1 tracking-widest leading-none">Status</p>
                                <div className="text-xl font-black italic text-emerald-900 tracking-tighter uppercase leading-none">{stats.count > 50 ? "LEGENDARY" : stats.count > 20 ? "VETERAN" : "EXPLORER"}</div>
                            </Card>
                        </div>

                        {loading ? <div className="text-center py-20 font-black animate-pulse text-emerald-800 uppercase tracking-widest">Syncing Satellite Data...</div> : 
                         currentView === 'map' ? (
                            <Card className="p-10 bg-white overflow-x-auto rounded-[3rem] shadow-xl border-none animate-fade-in">
                                <div className="min-w-[800px] flex flex-col items-center">
                                    <div className="grid gap-2 text-slate-900">
                                        {MAP_GRID.map((row, rIdx) => (
                                            <div key={rIdx} className="flex gap-2 justify-center">
                                                {row.map((p, pIdx) => {
                                                    if (!p) return <div key={pIdx} className="w-24 h-20"></div>;
                                                    const count = provinceStats[p] || 0;
                                                    return (
                                                        <div key={pIdx} 
                                                             onClick={() => handleProvinceClick(p)}
                                                             className={`w-24 h-20 rounded-2xl flex flex-col items-center justify-center p-3 text-center text-[10px] font-black uppercase transition-all hover:-translate-y-2 group relative ${getMapColor(p)}`}>
                                                            <span className="leading-tight">{p}</span>
                                                            {count > 0 && <span className="text-[10px] font-black mt-1 opacity-60">x{count}</span>}
                                                            {count > 0 && <div className="absolute top-1 right-1 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="ArrowLeft" size={12} className="rotate-[135deg]" /></div>}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </Card>
                         ) : currentView === 'feed' ? (
                            <div className="max-w-2xl mx-auto space-y-6 animate-fade-in">
                                {filterProvince && (
                                    <div className="flex items-center justify-between bg-emerald-100 p-4 rounded-2xl border border-emerald-200 text-emerald-900 mb-8 animate-fade-in">
                                        <div className="flex items-center gap-2 font-black uppercase text-xs tracking-widest"><Icon name="Filter" size={16} /> Viewing: {filterProvince}</div>
                                        <button onClick={() => setFilterProvince(null)} className="text-[10px] font-black uppercase bg-white px-3 py-1.5 rounded-lg shadow-sm hover:bg-emerald-50 transition-colors">Show All</button>
                                    </div>
                                )}
                                {filteredTrips.length === 0 ? <p className="text-center py-20 text-slate-400 font-bold italic uppercase">No Expeditions Logged in this region.</p> : 
                                filteredTrips.map(t => (
                                    <Card key={t.id} className="shadow-md text-slate-900 group">
                                        {t.imageUrl && <div className="image-grid p-2 bg-slate-100">{t.imageUrl.split(',').map((id, idx) => <img key={idx} src={`https://drive.google.com/thumbnail?id=${id}&sz=w800`} className="w-full h-48 object-cover rounded-2xl" />)}</div>}
                                        <div className="p-10">
                                            <h3 className="text-3xl font-black tracking-tighter italic uppercase mb-2">{t.title}</h3>
                                            <div className="flex gap-4 text-[10px] font-black uppercase text-emerald-800 mb-6 tracking-widest"><span>{t.province}</span>•<span>{t.date}</span>•<span>{t.distance} KM</span></div>
                                            <p className="text-slate-600 font-bold bg-slate-50/50 p-8 rounded-3xl border-l-[6px] border-emerald-800 italic text-lg shadow-inner">"{t.notes}"</p>
                                        </div>
                                    </Card>
                                ))}
                                <button onClick={() => setShowTripModal(true)} className="fixed bottom-8 right-8 bg-emerald-900 text-white w-20 h-20 rounded-full flex items-center justify-center shadow-2xl active:scale-95 transition-all z-40"><Icon name="Plus" size={32} /></button>
                            </div>
                         ) : currentView === 'logs' ? (
                            <div className="max-w-3xl mx-auto space-y-6 animate-fade-in text-slate-900">
                                <h2 className="text-3xl font-black italic uppercase tracking-tighter mb-6 italic">Service History</h2>
                                {maintenanceLogs.length === 0 ? <p className="text-center py-20 text-slate-400 font-bold italic uppercase">No Service History Found.</p> :
                                maintenanceLogs.sort((a,b) => new Date(b.date) - new Date(a.date)).map((log, idx) => (
                                    <Card key={idx} className="p-8 border-l-8 border-emerald-800">
                                        <div className="flex items-center gap-3 mb-1"><Icon name="Wrench" size={16} className="text-emerald-700" /><h3 className="text-xl font-black uppercase tracking-tight">{log.taskName}</h3></div>
                                        <div className="flex gap-4 text-[10px] font-black uppercase text-slate-400 mb-3"><span>{log.date}</span><span>•</span><span className="text-emerald-700">{log.mileage} KM</span></div>
                                        {log.notes && <p className="text-sm text-slate-600 italic bg-slate-50 p-4 rounded-xl font-medium">"{log.notes}"</p>}
                                    </Card>
                                ))}
                            </div>
                         ) : currentView === 'pm' ? (
                            <div className="space-y-10 animate-fade-in text-slate-900">
                                <h2 className="text-3xl font-black italic uppercase tracking-tighter mb-6 italic">Jeep Maintenance</h2>
                                {MAINTENANCE_PLAN.map((section, sIdx) => (
                                    <div key={sIdx} className="space-y-4">
                                        <div className="flex items-baseline gap-4 border-b-4 border-emerald-900 pb-2"><h3 className="text-xl font-black uppercase italic leading-none">{section.category}</h3><span className="text-emerald-600 font-black text-[10px] tracking-widest uppercase">{section.interval}</span></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {section.tasks.map(task => {
                                                const logs = maintenanceLogs.filter(l => l.taskName === task.name).sort((a,b) => new Date(b.date) - new Date(a.date));
                                                const last = logs[0];
                                                return (
                                                    <Card key={task.id} className="p-6 flex flex-col justify-between group hover:shadow-md transition-shadow">
                                                        <div><h4 className="text-lg font-black text-slate-800 mb-1 leading-tight">{task.name}</h4><p className="text-xs text-slate-500 leading-relaxed font-medium mb-4">{task.info}</p></div>
                                                        <div className="flex justify-between items-end mt-4">
                                                            <div className="text-[9px] font-black uppercase text-slate-400 leading-none italic">Last Log: {last ? <span className="text-emerald-700">{last.date} ({last.mileage} km)</span> : "N/A"}</div>
                                                            <button onClick={() => { setSelectedTask(task); setShowPMModal(true); }} className="bg-slate-900 text-white p-2.5 rounded-xl hover:bg-emerald-700 transition-colors shadow-lg"><Icon name="Wrench" size={16} /></button>
                                                        </div>
                                                    </Card>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                         ) : null}
                    </main>

                    {/* PM Modal */}
                    {showPMModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-emerald-950/60 backdrop-blur-md animate-in fade-in text-slate-900">
                            <Card className="w-full max-w-md p-10 shadow-2xl border-none">
                                <h2 className="text-2xl font-black italic uppercase mb-2 border-b-4 border-emerald-900 pb-2 leading-none italic">Record Service</h2>
                                <p className="text-[10px] font-black text-emerald-700 uppercase mb-8 tracking-widest">{selectedTask?.name}</p>
                                <form onSubmit={handleAddPM} className="space-y-6 text-slate-900">
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Mileage (KM)</label><input required type="number" className="w-full p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={pmFormData.mileage} onChange={e => setPmFormData({...pmFormData, mileage: e.target.value})} /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Date</label><input required type="date" className="w-full p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={pmFormData.date} onChange={e => setPmFormData({...pmFormData, date: e.target.value})} /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Notes</label><textarea className="w-full p-4 rounded-2xl bg-slate-50 font-medium outline-none border-2 border-transparent focus:border-emerald-600" value={pmFormData.notes} onChange={e => setPmFormData({...pmFormData, notes: e.target.value})}></textarea></div>
                                    <div className="flex gap-4 pt-4 text-slate-900"><button type="button" onClick={() => setShowPMModal(false)} className="flex-1 font-black text-slate-400 uppercase tracking-widest">Cancel</button><button type="submit" className="flex-1 py-4 bg-emerald-900 text-white rounded-2xl font-black uppercase shadow-lg">Save Record</button></div>
                                </form>
                            </Card>
                        </div>
                    )}

                    {/* Trip Modal พร้อมระบบบีบอัดรูปภาพที่ดุดันขึ้น */}
                    {showTripModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-emerald-950/60 backdrop-blur-md text-slate-900">
                            <Card className="w-full max-w-xl p-10 animate-fade-in overflow-y-auto max-h-[95vh] shadow-2xl border-none">
                                <h2 className="text-2xl font-black italic uppercase mb-8 border-b-4 border-emerald-900 pb-2 italic text-slate-900">New Expedition Log</h2>
                                <form onSubmit={handleAddTrip} className="space-y-6 text-slate-900">
                                    <input required placeholder="EXPEDITION TITLE" className="w-full p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600 uppercase" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select required className="p-4 rounded-2xl bg-slate-50 font-black outline-none" value={formData.province} onChange={e => setFormData({...formData, province: e.target.value})}><option value="">PROVINCE</option>{THAI_PROVINCES.map(p => <option key={p} value={p}>{p}</option>)}</select>
                                        <input type="date" required className="p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600 font-bold" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                    </div>
                                    <div className="p-8 border-2 border-dashed border-emerald-100 rounded-3xl text-center bg-emerald-50/20">
                                        <input type="file" multiple accept="image/*" className="hidden" id="file-upload" onChange={e => setSelectedFiles(Array.from(e.target.files).slice(0, 4))} />
                                        <label htmlFor="file-upload" className="cursor-pointer flex flex-col items-center gap-2"><Icon name="Camera" size={32} className="text-emerald-700" /><span className="font-black text-[10px] uppercase text-emerald-900">Upload Images (Max 4)</span>{selectedFiles.length > 0 && <span className="text-emerald-600 text-xs font-bold leading-none">{selectedFiles.length} files selected</span>}</label>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="DAYS" className="w-full p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={formData.duration} onChange={e => setFormData({...formData, duration: e.target.value})} />
                                        <input type="number" placeholder="DISTANCE (KM)" className="w-full p-4 rounded-2xl bg-slate-50 font-black outline-none border-2 border-transparent focus:border-emerald-600" value={formData.distance} onChange={e => setFormData({...formData, distance: e.target.value})} />
                                    </div>
                                    <textarea placeholder="JOURNAL ENTRY" className="w-full p-4 rounded-2xl bg-slate-50 font-medium outline-none border-2 border-transparent focus:border-emerald-600 text-slate-900" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})}></textarea>
                                    <div className="flex gap-4 text-slate-900"><button type="button" onClick={() => {setShowTripModal(false); setSelectedFiles([]);}} className="flex-1 font-black text-slate-400 uppercase tracking-widest leading-none" disabled={uploading}>Abort</button><button type="submit" className="flex-1 py-4 bg-emerald-900 text-white rounded-2xl font-black uppercase shadow-lg leading-none disabled:opacity-50" disabled={uploading}>{uploading ? 'Uploading Expedition...' : 'Record'}</button></div>
                                </form>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
